name: "Release new ext"

on:
  release:
    types:
      - created
  pull_request:
    branches:
      - 'debank'
  workflow_dispatch:

env:
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: zksync-era
  CHAINS: "lens abstract sophon zksync-era"
  DOCKERFILE: docker/external-node/Dockerfile
  AWS_REGION: us-east-1

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest-m
            arch: amd64
          - runner: ubuntu-latest-arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set env
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          else
            echo "REVISION=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Docker build and push
        run: |
          git submodule update --init
          docker build -t ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION} -f ${DOCKERFILE} .
          docker push ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION}

  merge-docker-manifest:
    runs-on: ubuntu-latest
    needs: build-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set env
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          else
            echo "REVISION=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Merge manifest and alias per-chain writers
        run: |
          docker pull --platform=linux/amd64 ${REGISTRY}/${IMAGE}:amd64-${REVISION}
          docker pull --platform=linux/arm64 ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          # repo 级 multi-arch manifest
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          # 各链 writer 别名(同 digest,多名)
          for c in ${CHAINS}; do
            docker buildx imagetools create --tag ${REGISTRY}/${c}-writer:${REVISION} ${REGISTRY}/${IMAGE}:${REVISION}
          done
          docker rmi ${REGISTRY}/${IMAGE}:amd64-${REVISION}
          docker rmi ${REGISTRY}/${IMAGE}:arm64-${REVISION}

      - name: Lark Notification
        continue-on-error: true
        run: |
          notiv3 "Blockchain zksync-era image pushed 🎉" ${REGISTRY}/${IMAGE}:${REVISION}
